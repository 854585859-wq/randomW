<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · Concert Info</title>
  <link rel="stylesheet" href="/css/style.css?v=3">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="topbar-logo">Concert Info</a>
      <div class="topbar-subtitle">Korea Concert Calendar</div>
      <div class="topbar-divider"></div>
      <nav class="topbar-links">
        <a href="/">日历</a>
        <a href="/venues">场馆</a>
        <button class="btn btn-sm" onclick="logout()" style="font-size:0.68rem;">登出</button>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="tabs" style="margin-top:1rem;">
      <div class="tab active" data-tab="concerts">演唱会</div>
      <div class="tab" data-tab="venues">场馆</div>
      <div class="tab" data-tab="stats">统计</div>
      <div class="tab" data-tab="subscriptions">订阅</div>
    </div>
    <div id="quickAdd" style="margin-bottom:1rem;display:none;">
      <form onsubmit="quickAddConcert(event)" style="display:flex;gap:0.5rem;">
        <input type="text" id="qaInput" class="form-input" placeholder="艺人 @ 场馆 日期 → 结束日期  (例: SEVENTEEN @ KSPO DOME 2026-07-20 → 2026-07-22)" style="flex:1;">
        <button type="submit" class="btn btn-primary">快速添加</button>
      </form>
    </div>
    <div id="tabContent"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    // --- Auth ---
    async function checkAuth() {
      try { const d = await api('/api/admin/check'); if (!d.loggedIn) location.href = '/admin'; }
      catch(e) { location.href = '/admin'; }
    }

    async function logout() {
      await api('/api/admin/logout', { method: 'POST' });
      location.href = '/admin';
    }

    // --- State ---
    let allVenues = [], allConcerts = [];
    let editingConcertId = null;
    let editingVenueId = null;
    let concertVenueFilter = null;
    let showExpired = false;

    // Quick add
    function quickAddConcert(e) {
      e.preventDefault();
      const input = document.getElementById('qaInput').value.trim();
      if (!input) return;

      // Parse: ARTIST @ VENUE DATE [→ END_DATE]
      const parts = input.split('@');
      if (parts.length < 2) return alert('格式：艺人 @ 场馆 日期');
      const artist = parts[0].trim();
      const rest = parts[1].trim();

      // Split venue and dates
      let venueName = '', dateStr = '', endDateStr = '';
      const dateSplit = rest.split('→').map(s => s.trim());
      const venueAndDate = dateSplit[0];
      if (dateSplit.length > 1) endDateStr = dateSplit[1];

      // Find venue that matches the end of venueAndDate
      for (const v of allVenues) {
        if (venueAndDate.toLowerCase().includes(v.name.toLowerCase())) {
          venueName = v.name;
          dateStr = venueAndDate.slice(venueAndDate.toLowerCase().indexOf(v.name.toLowerCase()) + v.name.length).trim();
          break;
        }
      }

      // Normalize dates
      dateStr = dateStr.replace(/\//g, '-').replace(/\./g, '-');
      endDateStr = endDateStr.replace(/\//g, '-').replace(/\./g, '-');

      // Find venue
      const venue = allVenues.find(v => v.name === venueName);
      if (!venue) return alert('场馆未找到："' + venueName + '"');
      if (!dateStr) return alert('请提供日期');

      // Fill form
      document.getElementById('cDate').value = dateStr;
      document.getElementById('cEndDate').value = endDateStr || '';
      document.getElementById('cArtist').value = artist;
      document.getElementById('cVenue').value = venue.id;
      document.getElementById('qaInput').value = '';

      // Scroll to form
      document.getElementById('concertForm')?.scrollIntoView({ behavior: 'smooth' });
    }

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = function() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        loadTab(this.dataset.tab);
      };
    });

    // ============================================================
    //  CONCERTS
    // ============================================================
    function renderConcerts() {
      const editing = editingConcertId ? allConcerts.find(c => c.id === editingConcertId) : null;
      let html = '';

      if (allConcerts.length === 0) {
        html += '<div class="empty"><div class="empty-icon">🎤</div><p>暂无演唱会</p></div>';
      } else {
        // Venue sub-tabs
        html += '<div class="tabs" style="margin-bottom:0.8rem;">';
        html += `<div class="tab ${concertVenueFilter === null ? 'active' : ''}" onclick="setVenueFilter(null)">全部</div>`;
        allVenues.forEach(v => {
          html += `<div class="tab ${concertVenueFilter === v.id ? 'active' : ''}" onclick="setVenueFilter(${v.id})">${escHtml(v.name)}</div>`;
        });
        html += '</div>';

        // Filtered concerts
        const today = new Date().toISOString().split('T')[0];
        let filtered = concertVenueFilter ? allConcerts.filter(c => c.venue_id === concertVenueFilter) : allConcerts;
        if (!showExpired) filtered = filtered.filter(c => (c.end_date || c.date) >= today);
        const totalCount = allConcerts.length;
        const activeCount = allConcerts.filter(c => (c.end_date || c.date) >= today).length;
        const grouped = {};
        filtered.forEach(c => {
          const vId = c.venue_id;
          if (!grouped[vId]) grouped[vId] = [];
          grouped[vId].push(c);
        });
        Object.values(grouped).forEach(arr => arr.sort((a, b) => a.date.localeCompare(b.date)));

        html += `<p style="font-size:0.7rem;color:var(--ink-25);margin-bottom:0.5rem;">
          ${activeCount} 场进行中 · ${totalCount - activeCount} 场已过期
          ${(totalCount - activeCount) > 0 ? `<a href="#" onclick="toggleExpired(event)" style="color:var(--ink-50);">${showExpired ? '隐藏过期' : '显示过期'}</a>` : ''}
        </p>`;

        if (filtered.length === 0) {
          html += '<div class="empty"><p>暂无演唱会</p></div>';
        }
        for (const [vId, concerts] of Object.entries(grouped)) {
          const vName = concerts[0].venue_name;
          if (!concertVenueFilter) {
            html += `<h3 style="font-family:var(--serif);font-weight:400;font-size:0.9rem;margin:0.5rem 0 0.3rem;color:var(--ink-50);">${escHtml(vName)} · ${concerts.length} 场</h3>`;
          }
          html += '<div class="table-wrap"><table><thead><tr><th>日期</th><th>艺人</th><th>描述</th><th></th></tr></thead><tbody>';
          concerts.forEach(c => {
            html += `<tr>
              <td>${c.end_date ? escHtml(c.date) + ' → ' + escHtml(c.end_date) : escHtml(c.date)}</td>
              <td><strong>${escHtml(c.artist)}</strong></td>
              <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(c.description || '-')}</td>
              <td style="white-space:nowrap;">
                <button class="btn btn-sm" onclick="startEditConcert(${c.id})">编辑</button>
                <button class="btn btn-sm btn-danger" onclick="deleteConcert(${c.id})">删除</button></td></tr>`;
          });
          html += '</tbody></table></div>';
        }
      }

      // Form
      html += `<div class="card" style="margin-top:1.25rem;">
        <h3 style="font-weight:500;margin-bottom:0.8rem;font-size:0.9rem;">${editing ? '编辑演唱会' : '添加演唱会'}</h3>
        <form id="concertForm" onsubmit="saveConcert(event)">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <div class="form-group"><label>开始日期</label><input type="date" id="cDate" class="form-input" required value="${editing?.date || ''}"></div>
            <div class="form-group"><label>结束日期（可空）</label><input type="date" id="cEndDate" class="form-input" value="${editing?.end_date || ''}"></div>
            <div class="form-group"><label>艺人</label><input type="text" id="cArtist" class="form-input" required value="${escHtml(editing?.artist || '')}"></div>
            <div class="form-group"><label>场馆</label><select id="cVenue" class="form-input" required>
              <option value="">— 选择 —</option>
              ${allVenues.map(v => `<option value="${v.id}" ${editing?.venue_id === v.id ? 'selected' : ''}>${escHtml(v.name)}</option>`).join('')}
            </select></div>
            <div class="form-group"><label>描述</label><input type="text" id="cDesc" class="form-input" value="${escHtml(editing?.description || '')}"></div>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top:0.75rem;">${editing ? '更新' : '添加'}</button>
          ${editing ? '<button type="button" class="btn" onclick="cancelEditConcert()" style="margin-top:0.75rem;margin-left:0.4rem;">取消</button>' : ''}
        </form></div>`;

      return html;
    }

    window.startEditConcert = function(id) {
      editingConcertId = id;
      loadData();
    };

    window.toggleExpired = function(e) {
      e.preventDefault();
      showExpired = !showExpired;
      loadData();
    };

    window.setVenueFilter = function(venueId) {
      concertVenueFilter = venueId;
      loadData();
    };

    window.cancelEditConcert = function() {
      editingConcertId = null;
      loadData();
    };

    async function saveConcert(e) {
      e.preventDefault();
      const venueId = parseInt(document.getElementById('cVenue').value);
      const venue = allVenues.find(v => v.id === venueId);
      try {
        await api('/api/admin/concerts', { method: 'POST', body: JSON.stringify({
          id: editingConcertId,
          date: document.getElementById('cDate').value,
          endDate: document.getElementById('cEndDate').value || null,
          artist: document.getElementById('cArtist').value.trim(),
          venueId, venueName: venue?.name || '',
          description: document.getElementById('cDesc').value.trim(),
        })});
        editingConcertId = null;
        loadData();
      } catch(err) { alert('保存失败: ' + err.message); }
    }

    async function deleteConcert(id) {
      if (!confirm('确定删除？')) return;
      try { await api(`/api/admin/concerts/${id}`, { method: 'DELETE' }); loadData(); }
      catch(err) { alert('删除失败: ' + err.message); }
    }

    // ============================================================
    //  VENUES
    // ============================================================
    function renderVenues() {
      let html = allVenues.length === 0
        ? '<div class="alert alert-info">暂无场馆，请先添加场馆。</div>' : '';
      html += '<div class="card">';
      html += '<h3 style="font-weight:500;margin-bottom:0.8rem;font-size:0.9rem;">场馆列表</h3>';
      if (allVenues.length > 0) {
        html += '<table><thead><tr><th>ID</th><th>名称</th><th></th></tr></thead><tbody>';
        allVenues.forEach(v => {
          html += `<tr>
            <td>${v.id}</td><td><strong>${escHtml(v.name)}</strong></td>
            <td><button class="btn btn-sm" onclick="startEditVenue(${v.id})">编辑</button>
                <button class="btn btn-sm btn-danger" onclick="deleteVenue(${v.id})">删除</button></td></tr>`;
        });
        html += '</tbody></table>';
      }

      const ev = editingVenueId ? allVenues.find(v => v.id === editingVenueId) : null;
      html += `<form id="venueForm" onsubmit="saveVenue(event)" style="margin-top:1rem;display:flex;gap:0.5rem;align-items:end;">
        <div class="form-group" style="flex:1;margin-bottom:0;">
          <label>场馆名称</label><input type="text" id="vName" class="form-input" required value="${escHtml(ev?.name || '')}">
        </div>
        <button type="submit" class="btn btn-primary">${ev ? '更新' : '添加'}</button>
        ${ev ? '<button type="button" class="btn" onclick="cancelEditVenue()">取消</button>' : ''}
      </form></div>`;
      return html;
    }

    window.startEditVenue = function(id) {
      editingVenueId = id;
      loadData();
    };
    window.cancelEditVenue = function() {
      editingVenueId = null;
      loadData();
    };

    async function saveVenue(e) {
      e.preventDefault();
      try {
        await api('/api/admin/venues', { method: 'POST', body: JSON.stringify({
          id: editingVenueId, name: document.getElementById('vName').value.trim(),
        })});
        editingVenueId = null;
        loadData();
      } catch(err) { alert('保存失败: ' + err.message); }
    }

    async function deleteVenue(id) {
      if (!confirm('确定删除？有关联数据则无法删除。')) return;
      try { await api(`/api/admin/venues/${id}`, { method: 'DELETE' }); loadData(); }
      catch(err) { alert('删除失败: ' + err.message); }
    }

    // ============================================================
    //  STATS
    // ============================================================
    async function renderStats() {
      try {
        const s = await api('/api/admin/stats');
        return `<div class="card" style="text-align:center;">
          <h3 style="font-weight:500;margin-bottom:1rem;font-size:0.9rem;">访问统计</h3>
          <div style="display:flex;justify-content:center;gap:2rem;">
            <div><p style="font-size:2.2rem;font-weight:500;">${s.today}</p><p style="color:var(--ink-50);font-size:0.75rem;">今日访问</p></div>
            <div><p style="font-size:2.2rem;font-weight:500;">${s.total}</p><p style="color:var(--ink-50);font-size:0.75rem;">总访问量</p></div>
          </div>
        </div>`;
      } catch(e) { return '<div class="empty"><p>加载失败</p></div>'; }
    }

    // ============================================================
    //  SUBSCRIPTIONS
    // ============================================================
    async function renderSubscriptions() {
      let html = '<div class="card"><h3 style="font-weight:500;margin-bottom:0.8rem;font-size:0.9rem;">订阅列表</h3>';
      try {
        const subs = await api('/api/admin/subscriptions');
        if (subs.length === 0) {
          html += '<div class="empty"><p>暂无订阅</p></div>';
        } else {
          html += `<table><thead><tr><th>邮箱</th><th>艺人</th><th>订阅时间</th><th></th></tr></thead><tbody>
            ${subs.map(s => `<tr>
              <td>${escHtml(s.email)}</td><td><strong>${escHtml(s.artist)}</strong></td>
              <td>${new Date(s.createdAt).toLocaleDateString('zh-CN')}</td>
              <td><button class="btn btn-sm btn-danger" onclick="deleteSub(${s.id})">删除</button></td></tr>`).join('')}
          </tbody></table>`;
        }
      } catch(e) { html += '<div class="empty"><p>加载失败</p></div>'; }
      html += '</div>';
      return html;
    }

    async function deleteSub(id) {
      if (!confirm('确定删除？')) return;
      try { await api(`/api/admin/subscriptions/${id}`, { method: 'DELETE' }); loadData(); }
      catch(err) { alert('删除失败: ' + err.message); }
    }

    // ============================================================
    //  DATA
    // ============================================================
    async function loadData() {
      try { allConcerts = await api('/api/concerts'); } catch(e) { allConcerts = []; }
      try { allVenues = await api('/api/venues'); } catch(e) { allVenues = []; }
      const tab = document.querySelector('.tab.active')?.dataset.tab || 'concerts';
      document.getElementById('quickAdd').style.display = tab === 'concerts' ? 'block' : 'none';
      const content = document.getElementById('tabContent');
      if (tab === 'concerts') content.innerHTML = renderConcerts();
      else if (tab === 'venues') content.innerHTML = renderVenues();
      else if (tab === 'stats') content.innerHTML = await renderStats();
      else if (tab === 'subscriptions') content.innerHTML = await renderSubscriptions();
    }

    async function loadTab(tab) {
      editingConcertId = null;
      editingVenueId = null;
      await loadData();
    }

    checkAuth().then(() => loadData());
  </script>
</body>
</html>
